<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Shield</title>

<style>

body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2b6b, #1f4fd8);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:white;
    width:450px;
    padding:35px;
    border-radius:18px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.logo {
    text-align:center;
    margin-bottom:15px;
}

.logo img {
    height:60px;
}

h1 {
    text-align:center;
    margin:5px 0 5px 0;
}

.subtitle {
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input {
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#1f4fd8,#4d79ff);
    color:white;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    transform:translateY(-2px);
}

.result {
    margin-top:25px;
    padding:15px;
    border-radius:10px;
    display:none;
    font-size:14px;
}

.match {
    background:#e6f9f0;
    border-left:5px solid #00b368;
    color:#006c3a;
}

.no-match {
    background:#fde8e8;
    border-left:5px solid #e11d48;
    color:#9f1239;
}

.close-match {
    background:#fff4e5;
    border-left:5px solid #ff9800;
    color:#9a6700;
}

.badge {
    font-weight:bold;
    margin-bottom:8px;
}

.cert {
    margin-top:10px;
    font-size:13px;
    color:#444;
}

</style>
</head>

<body>

<div class="card">

    <div class="logo">
        <!-- SOSTITUISCI logo.png con il tuo file -->
        <img src="logo.png" alt="IBAN Shield Logo">
    </div>

    <h1>IBAN Shield</h1>
    <div class="subtitle">Verifica tecnica IBAN + intestatario</div>

    <input type="text" id="iban" placeholder="Inserisci IBAN">
    <input type="text" id="name" placeholder="Intestatario">
    <input type="number" id="amount" placeholder="Importo (€)">

    <button onclick="verifica()">Continua</button>

    <div id="result" class="result"></div>

</div>

<script>

async function verifica() {

    const iban = document.getElementById("iban").value.trim();
    const name = document.getElementById("name").value.trim();
    const amount = document.getElementById("amount").value.trim();
    const resultBox = document.getElementById("result");

    resultBox.style.display = "none";

    if (!iban || !name || !amount) {
        showResult("Compila tutti i campi.", "no-match");
        return;
    }

    const url = `https://iban-shield.onrender.com/pre-transaction-check?iban=${encodeURIComponent(iban)}&name=${encodeURIComponent(name)}&amount=${encodeURIComponent(amount)}`;

    try {

        const response = await fetch(url, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                "X-API-Key": "ibanshield_super_secret_v1"
            }
        });

        const data = await response.json();

        if (!response.ok) {
            showResult("Errore durante la verifica.", "no-match");
            return;
        }

        const match = data.verification.name_match.match_status;
        const message = data.verification.security_message;
        const cert = data.certificate.certificate_id;
        const fee = data.pricing.fee_amount_eur;

        let cssClass = "match";

        if (match === "no_match") cssClass = "no-match";
        if (match === "close_match") cssClass = "close-match";

        showResult(`
            <div class="badge">Esito: ${match.toUpperCase()}</div>
            ${message}<br><br>
            Fee applicata: € ${fee}
            <div class="cert">
                Certificato: ${cert}
            </div>
        `, cssClass);

    } catch (error) {
        showResult("Errore di connessione al server.", "no-match");
    }
}

function showResult(message, type) {
    const box = document.getElementById("result");
    box.className = "result " + type;
    box.innerHTML = message;
    box.style.display = "block";
}

</script>

</body>
</html>
