<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Shield</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Inter,system-ui;
  background:linear-gradient(135deg,#0b1220,#111b2f);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  width:520px;
  background:white;
  border-radius:22px;
  padding:30px;
  box-shadow:0 25px 70px rgba(0,0,0,.5);
}
h1{
  margin:0 0 15px 0;
  font-size:28px;
}
input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid #ddd;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:15px;
  font-weight:800;
  cursor:pointer;
}
.primary{ background:#2563eb; color:white; }
.pay{ background:#16a34a; color:white; display:none; }
.pdf{ background:black; color:white; display:none; }

.result{
  margin-top:20px;
  padding:15px;
  border-radius:14px;
  font-weight:700;
}
.success{ background:#dcfce7; color:#065f46; }
.warning{ background:#fef9c3; color:#92400e; }
.error{ background:#fee2e2; color:#991b1b; }
</style>
</head>

<body>
<div class="card">

<h1>IBAN Shield</h1>

<input id="iban" placeholder="IBAN">
<input id="name" placeholder="Intestatario">
<input id="amount" type="number" placeholder="Importo €">

<button class="primary" onclick="preCheck()">Verifica</button>

<div id="result"></div>

<button id="payBtn" class="pay" onclick="unlock()">💳 Paga €1,99 & Sblocca</button>
<button id="pdfBtn" class="pdf" onclick="generatePDF()">📄 Scarica Certificato</button>

</div>

<script>

const RENDER_BASE = "https://iban-shield.onrender.com";

let lastResponse = null;

async function preCheck(){

  const iban = document.getElementById("iban").value.trim();
  const name = document.getElementById("name").value.trim();
  const amount = document.getElementById("amount").value.trim();

  if(!iban || !name || !amount){
    showResult("Compila tutti i campi","error");
    return;
  }

  try{
    const res = await fetch(`${RENDER_BASE}/frontend-precheck`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ iban,name,amount })
    });

    const data = await res.json();

    if(!res.ok){
      showResult("Errore API","error");
      return;
    }

    lastResponse = data;

    showResult(
      `🔒 Verifica disponibile<br>
       Fee: € ${data.pricing.fee_amount_eur}<br>
       Completa il pagamento per sbloccare l’esito ufficiale.`,
      "warning"
    );

    document.getElementById("payBtn").style.display="block";

  }catch(e){
    showResult("Errore rete o servizio asleep","error");
  }
}

function unlock(){

  const match = lastResponse.verification.name_match.match_status;
  const score = lastResponse.verification.name_match.confidence_score;

  let msg="", cls="";

  if(match==="match"){
    msg="✅ MATCH confermato";
    cls="success";
  }
  else if(match==="close_match"){
    msg="⚠ MATCH PARZIALE (verifica consigliata)";
    cls="warning";
  }
  else{
    msg="❌ NO MATCH";
    cls="error";
  }

  showResult(
    `${msg}<br>
     Shield Score: ${score}/100`,
    cls
  );

  document.getElementById("payBtn").style.display="none";
  document.getElementById("pdfBtn").style.display="block";
}

function showResult(html,type){
  const el=document.getElementById("result");
  el.innerHTML=html;
  el.className="result "+type;
}

function generatePDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("IBAN Shield - Certificato Ufficiale",20,20);

  doc.setFontSize(12);
  doc.text("Transaction ID: "+lastResponse.transaction_id,20,40);
  doc.text("IBAN: "+lastResponse.inputs.iban,20,50);
  doc.text("Intestatario: "+lastResponse.inputs.name,20,60);
  doc.text("Importo: € "+lastResponse.inputs.amount,20,70);

  doc.text("Match Status: "+lastResponse.verification.name_match.match_status,20,90);
  doc.text("Confidence Score: "+lastResponse.verification.name_match.confidence_score+"/100",20,100);

  doc.text("Data: "+new Date().toLocaleString(),20,120);

  doc.save("Certificato_IBAN_Shield.pdf");
}

</script>

</body>
</html>
