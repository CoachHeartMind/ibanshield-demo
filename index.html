<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Shield - Demo</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    margin-bottom: 5px;
}

.subtitle {
    color: #666;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg,#2c5eff,#6a8cff);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.result {
    margin-top: 20px;
    padding: 12px;
    border-radius: 8px;
    display: none;
    font-size: 14px;
}

.success {
    background: #e6f7ec;
    color: #0a7d34;
}

.error {
    background: #fde8e8;
    color: #b42318;
}
</style>
</head>

<body>

<div class="container">
    <h1>IBAN Shield</h1>
    <div class="subtitle">Verifica tecnica IBAN + intestatario</div>

    <input type="text" id="iban" placeholder="Inserisci IBAN">
    <input type="text" id="name" placeholder="Intestatario">
    <input type="number" id="amount" placeholder="Importo (€)">

    <button onclick="verifica()">Verifica (1,99€)</button>

    <div id="result" class="result"></div>
</div>

<script>
async function verifica() {

    const iban = document.getElementById("iban").value.trim();
    const name = document.getElementById("name").value.trim();
    const amount = document.getElementById("amount").value.trim();

    const resultBox = document.getElementById("result");
    resultBox.style.display = "none";

    if (!iban || !name || !amount) {
        showError("Compila tutti i campi.");
        return;
    }

    const url = `https://iban-shield.onrender.com/pre-transaction-check?iban=${encodeURIComponent(iban)}&name=${encodeURIComponent(name)}&amount=${encodeURIComponent(amount)}`;

    try {
        const response = await fetch(url, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                "X-API-Key": "ibanshield_super_secret_v1"
            }
        });

        if (response.status === 401) {
            showError("API Key non valida.");
            return;
        }

        const data = await response.json();

        if (!response.ok) {
            showError(data.error || "Errore durante la verifica.");
            return;
        }

        const match = data.verification.name_match.match_status;
        const securityMessage = data.verification.security_message;
        const fee = data.pricing.fee_amount_eur;
        const certId = data.certificate.certificate_id;

        showSuccess(`
            <strong>Esito:</strong> ${match.toUpperCase()}<br>
            <strong>Messaggio:</strong> ${securityMessage}<br>
            <strong>Fee:</strong> € ${fee}<br>
            <strong>Certificato:</strong> ${certId}
        `);

    } catch (error) {
        showError("Errore di connessione al server.");
    }
}

function showSuccess(message) {
    const box = document.getElementById("result");
    box.className = "result success";
    box.innerHTML = message;
    box.style.display = "block";
}

function showError(message) {
    const box = document.getElementById("result");
    box.className = "result error";
    box.innerHTML = message;
    box.style.display = "block";
}
</script>

</body>
</html>
