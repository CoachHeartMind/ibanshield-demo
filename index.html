<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Shield</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#2563eb;
  --primary2:#1e40af;
  --success:#16a34a;
  --warning:#f59e0b;
  --error:#dc2626;
}

body{
  margin:0;
  font-family: Inter, system-ui;
  background: linear-gradient(135deg,#0b1220,#111b2f);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:520px;
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 30px 70px rgba(0,0,0,.5);
}

h1{
  margin:0;
  font-size:28px;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:15px;
  font-weight:bold;
  cursor:pointer;
}

.btn-primary{
  background:linear-gradient(180deg,var(--primary),var(--primary2));
  color:white;
}

.btn-pay{
  background:linear-gradient(180deg,#16a34a,#15803d);
  color:white;
  display:none;
}

.btn-pdf{
  background:black;
  color:white;
  display:none;
}

.result{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  font-weight:600;
}

.success{ background:#dcfce7; color:#065f46; }
.warning{ background:#fef9c3; color:#92400e; }
.error{ background:#fee2e2; color:#991b1b; }

.score{
  margin-top:8px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="card">
<h1>IBAN Shield</h1>

<input id="iban" placeholder="IBAN">
<input id="name" placeholder="Intestatario">
<input id="amount" type="number" placeholder="Importo €">

<button class="btn-primary" onclick="preCheck()">Verifica</button>

<div id="result"></div>

<button id="payBtn" class="btn-pay" onclick="unlock()">💳 Paga & Sblocca</button>
<button id="pdfBtn" class="btn-pdf" onclick="generatePDF()">📄 Scarica Certificato</button>

</div>

<script>

// ======================
// CONFIG
// ======================
const API_BASE = "https://YOUR_RENDER_URL.onrender.com";
const API_KEY  = "YOUR_API_KEY";

let lastResponse = null;

// ======================
// STEP 1 - PRE CHECK
// ======================
async function preCheck(){

  const iban = document.getElementById("iban").value.trim();
  const name = document.getElementById("name").value.trim();
  const amount = document.getElementById("amount").value.trim();

  if(!iban || !name || !amount){
    showResult("Compila tutti i campi","error");
    return;
  }

  const url = `${API_BASE}/pre-transaction-check?iban=${encodeURIComponent(iban)}&name=${encodeURIComponent(name)}&amount=${amount}`;

  try{
    const res = await fetch(url,{
      headers:{
        "X-API-Key": API_KEY
      }
    });

    if(!res.ok){
      showResult("Errore connessione API","error");
      return;
    }

    const data = await res.json();
    lastResponse = data;

    showResult(
      `🔒 Verifica disponibile.<br>Fee: € ${data.pricing.fee_amount_eur}`,
      "warning"
    );

    document.getElementById("payBtn").style.display="block";

  }catch(err){
    showResult("Errore rete o API","error");
  }
}

// ======================
// STEP 2 - UNLOCK
// ======================
function unlock(){

  if(!lastResponse){
    showResult("Esegui prima verifica","error");
    return;
  }

  const match = lastResponse.verification.name_match.match_status;
  const score = lastResponse.verification.name_match.confidence_score;

  let msg="";
  let cls="";

  if(match==="match"){
    msg="✅ MATCH confermato";
    cls="success";
  }
  else if(match==="close_match"){
    msg="⚠ Match parziale. Verifica possibili differenze nel nome.";
    cls="warning";
  }
  else{
    msg="❌ NO MATCH. Dati non coerenti.";
    cls="error";
  }

  showResult(msg+`<div class="score">Shield Score: ${score}/100</div>`,cls);

  document.getElementById("payBtn").style.display="none";
  document.getElementById("pdfBtn").style.display="block";
}

// ======================
// RESULT UI
// ======================
function showResult(html,type){
  const el=document.getElementById("result");
  el.innerHTML=html;
  el.className="result "+type;
}

// ======================
// PDF GENERATION
// ======================
function generatePDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("IBAN Shield - Certificato Verifica",20,20);

  doc.setFontSize(12);
  doc.text("Transaction ID: "+lastResponse.transaction_id,20,40);
  doc.text("IBAN: "+lastResponse.inputs.iban,20,50);
  doc.text("Intestatario: "+lastResponse.inputs.name,20,60);
  doc.text("Importo: € "+lastResponse.inputs.amount,20,70);

  doc.text("Match Status: "+lastResponse.verification.name_match.match_status,20,90);
  doc.text("Confidence Score: "+lastResponse.verification.name_match.confidence_score+"/100",20,100);

  doc.save("IBAN_Shield_Certificato.pdf");
}

</script>

</body>
</html>
