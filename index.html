<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Shield</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0b1220,#111b2f);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:white;
  padding:30px;
  border-radius:20px;
  width:420px;
}
input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.result{
  margin-top:15px;
  padding:10px;
  border-radius:10px;
}
.success{background:#d1fae5;color:#065f46;}
.warning{background:#fef3c7;color:#92400e;}
.error{background:#fee2e2;color:#991b1b;}
</style>
</head>
<body>

<div class="card">

<h2>IBAN Shield</h2>

<input id="iban" placeholder="IBAN">
<input id="nome" placeholder="Intestatario">
<input id="importo" type="number" placeholder="Importo">

<button onclick="verifica()">Verifica €1.99</button>

<div id="risultato"></div>
<button id="pdfBtn" style="display:none;margin-top:10px;" onclick="generaPDF()">Scarica Certificato</button>

</div>

<script>

const API_BASE = "https://iban-shield.onrender.com";

let lastData = null;

async function verifica(){

  const iban = document.getElementById("iban").value;
  const nome = document.getElementById("nome").value;
  const importo = document.getElementById("importo").value;
  const result = document.getElementById("risultato");

  result.innerHTML = "Verifica in corso...";
  result.className = "result warning";

  try{

    const response = await fetch(
      API_BASE + "/pre-transaction-check?iban=" +
      encodeURIComponent(iban) +
      "&name=" +
      encodeURIComponent(nome) +
      "&amount=" +
      encodeURIComponent(importo)
    );

    const data = await response.json();
    lastData = data;

    const status = data.verification.name_match.match_status;
    const score = data.verification.name_match.confidence_score;

    if(status === "match"){
      result.innerHTML = "✅ Match confermato. Score: " + score + "/100";
      result.className = "result success";
    }
    else if(status === "close_match"){
      result.innerHTML = "⚠ Match parziale. Score: " + score + "/100";
      result.className = "result warning";
    }
    else{
      result.innerHTML = "❌ No match. Score: " + score + "/100";
      result.className = "result error";
    }

    document.getElementById("pdfBtn").style.display = "block";

  }catch(e){
    result.innerHTML = "Errore connessione server";
    result.className = "result error";
  }
}

function generaPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Certificato IBAN Shield",20,20);
  doc.text("Transaction ID: " + lastData.transaction_id,20,40);
  doc.text("Score: " + lastData.verification.name_match.confidence_score,20,50);

  doc.save("Certificato_IBAN_Shield.pdf");
}

</script>

</body>
</html>
