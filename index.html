<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IBAN Shield</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:white;
  color:black;
  padding:30px;
  border-radius:12px;
  width:400px;
}
input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
.result{
  margin-top:15px;
  padding:10px;
  border-radius:8px;
}
.success{background:#d1fae5;color:#065f46;}
.warning{background:#fef3c7;color:#92400e;}
.error{background:#fee2e2;color:#991b1b;}
</style>
</head>

<body>

<div class="card">

<h2>IBAN Shield</h2>
<p>Verifica tecnica IBAN + intestatario</p>

<input id="iban" placeholder="IBAN">
<input id="nome" placeholder="Intestatario">
<input id="importo" type="number" placeholder="Importo €">

<button onclick="verifica()">Verifica (1,99€)</button>

<div id="risultato"></div>

</div>

<script>

const API_URL = "https://iban-shield.onrender.com/pre-transaction-check";
const API_KEY = "INSERISCI_LA_TUA_API_KEY";

async function verifica(){

  const iban = document.getElementById("iban").value.trim();
  const nome = document.getElementById("nome").value.trim();
  const importo = document.getElementById("importo").value;

  const result = document.getElementById("risultato");
  result.innerHTML = "";
  result.className = "result";

  if(!iban || !nome || !importo){
    result.innerHTML = "Compila tutti i campi.";
    result.classList.add("error");
    return;
  }

  try{

    const response = await fetch(
      `${API_URL}?iban=${encodeURIComponent(iban)}&name=${encodeURIComponent(nome)}&amount=${encodeURIComponent(importo)}`,
      {
        method: "GET",
        headers: {
          "X-API-Key": API_KEY
        }
      }
    );

    if(response.status === 401){
      result.innerHTML = "API Key non valida.";
      result.classList.add("error");
      return;
    }

    if(!response.ok){
      result.innerHTML = "Errore server.";
      result.classList.add("error");
      return;
    }

    const data = await response.json();

    const matchStatus = data.name_check.match_status;
    const riskLevel = data.risk_level;
    const fee = data.guarantee_fee;

    if(matchStatus === "match"){
      result.innerHTML = `
        ✔ Verifica completata<br>
        Livello rischio: ${riskLevel}<br>
        Commissione: ${fee}€<br>
        ID Transazione: ${data.transaction_id}
      `;
      result.classList.add("success");
    }
    else if(matchStatus === "close_match"){
      result.innerHTML = `
        ⚠ Attenzione: dati simili<br>
        Livello rischio: ${riskLevel}
      `;
      result.classList.add("warning");
    }
    else{
      result.innerHTML = `
        ✖ Verifica non superata<br>
        Livello rischio: ${riskLevel}
      `;
      result.classList.add("error");
    }

  }catch(e){
    result.innerHTML = "Errore di connessione.";
    result.classList.add("error");
  }
}

</script>

</body>
</html>
